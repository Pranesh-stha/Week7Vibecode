services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: vehicle_rental
      POSTGRES_USER: rentaluser
      POSTGRES_PASSWORD: rentalpass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rentaluser -d vehicle_rental"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    volumes:
      - .:/app
      - media_files:/app/media
    ports:
      - "8000:8000"
    environment:
      DEBUG: "False"
      SECRET_KEY: "django-insecure-vehicle-rental-secret-key-change-in-production"
      DATABASE_URL: "postgres://rentaluser:rentalpass@db:5432/vehicle_rental"
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  media_files:
