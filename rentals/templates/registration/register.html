{% extends 'rentals/base.html' %}
{% load crispy_forms_tags %}

{% block title %}Register - DriveEasy{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card p-4">
        <div class="text-center mb-4">
          <i class="bi bi-person-plus-fill display-3 text-danger"></i>
          <h3 class="fw-bold mt-2">Create Account</h3>
          <p class="text-muted">Join DriveEasy and start renting today</p>
        </div>
        <form method="post">
          {% csrf_token %}
          {{ form|crispy }}
          <button type="submit" class="btn btn-accent w-100 mt-3 btn-lg">
            <i class="bi bi-person-check me-2"></i>Create Account
          </button>
        </form>
        <p class="text-center mt-3 text-muted">
          Already have an account? <a href="{% url 'login' %}" class="text-danger fw-bold">Login here</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
