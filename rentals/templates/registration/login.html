{% extends 'rentals/base.html' %}
{% load crispy_forms_tags %}

{% block title %}Login - DriveEasy{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card p-4">
        <div class="text-center mb-4">
          <i class="bi bi-car-front-fill display-3 text-danger"></i>
          <h3 class="fw-bold mt-2">Welcome Back</h3>
          <p class="text-muted">Login to manage your rentals</p>
        </div>
        <form method="post">
          {% csrf_token %}
          {{ form|crispy }}
          <button type="submit" class="btn btn-accent w-100 mt-3 btn-lg">
            <i class="bi bi-box-arrow-in-right me-2"></i>Login
          </button>
        </form>
        <p class="text-center mt-3 text-muted">
          Don't have an account? <a href="{% url 'register' %}" class="text-danger fw-bold">Register here</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
